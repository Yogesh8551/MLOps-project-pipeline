name: Smart ML Test Pipeline

on:
  push:
    branches:
    - main
  pull_request:


jobs:
  ml-test-pipeline:
    runs-on: ubuntu-latest

    steps:

    # 1️⃣ Checkout code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2️⃣ Detect changed files
    - name: Get changed files
      run: |
        git fetch origin main
        git diff --name-only origin/main...HEAD > changed_files.txt || echo "main.py" > changed_files.txt
        echo "Changed files:"
        cat changed_files.txt

    # 3️⃣ Setup Python
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    # 4️⃣ Install dependencies
    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    # ✅ 5️⃣ FIX: Set PYTHONPATH
    - name: Set PYTHONPATH
      run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

    # 6️⃣ Run ML model
    - name: Run ML predictor
      run: |
        python ml/predict.py
        echo "Selected tests:"
        cat tests_to_run.txt

    # 7️⃣ Run selected tests
    - name: Run selected tests
      run: |
        while read test; do
          echo "Running $test"
          python -m pytest tests/$test
        done < tests_to_run.txt

    # 8️⃣ Success message
    - name: Pipeline completed
      run: echo "✅ ML Pipeline executed successfully"
